<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Crowd Monitor</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .login-box{background:rgba(255,255,255,0.95);padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);width:100%;max-width:400px;text-align:center;}
        h2{color:#2c3e50;margin-bottom:10px;font-size:2em;}
        p{color:#7f8c8d;margin-bottom:30px;}
        input{width:100%;padding:15px;margin-bottom:20px;border:2px solid #ddd;border-radius:10px;font-size:1.1em;transition:0.3s;outline:none;}
        input:focus{border-color:#667eea;}
        .btn{width:100%;padding:15px;background:linear-gradient(45deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;font-size:1.2em;cursor:pointer;font-weight:bold;transition:transform 0.3s;}
        .btn:hover{transform:translateY(-3px);box-shadow:0 10px 20px rgba(102,126,234,0.4);}
        .error{color:#e74c3c;background:#fdeea;padding:10px;border-radius:8px;margin-bottom:20px;font-weight:bold;}
    </style>
</head>
<body>
    <div class="login-box">
        <div style="font-size:4em;margin-bottom:10px;">🔐</div>
        <h2>Admin Gateway</h2>
        <p>Authorized personnel only</p>
        
        {% if error %}
            <div class="error">❌ {{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Login to System</button>
        </form>
    </div>
</body>
</html>
